name: ${COMPOSE_PROJECT_NAME:-supplier-contacts}

services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16}
    hostname: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metabase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${METABASE_APP_DB:-metabase}
      TZ: ${TZ:-UTC}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./data/Listado-de-proveedores-y-contactos.csv:/data/supplier-contacts.csv:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-metabase} -d ${METABASE_APP_DB:-metabase}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - retail_net

  metabase:
    image: metabase/metabase:${METABASE_IMAGE_TAG:-latest}
    hostname: metabase
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_APP_DB:-metabase}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-metabase}
      MB_DB_PASS: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      MB_DB_HOST: postgres
      MB_SITE_URL: ${MB_SITE_URL:-http://localhost:3000}
      JAVA_TIMEZONE: ${TZ:-UTC}
    volumes:
      - /dev/urandom:/dev/random:ro
      - mb_data:/metabase-data
    networks:
      - retail_net

volumes:
  pg_data:
  mb_data:

networks:
  retail_net:
    driver: bridge
