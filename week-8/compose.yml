services:
  postgres:
    image: postgres:17
    container_name: online-retail-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase123
      POSTGRES_DB: metabase
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./data/online-retail.csv:/data/online-retail.csv:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabase"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - retail_net

  metabase:
    image: metabase/metabase:latest
    container_name: online-retail-metabase
    hostname: metabase
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase123
      MB_DB_HOST: postgres
    volumes:
      - /dev/urandom:/dev/random:ro
      - mb_data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -I http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - retail_net

volumes:
  pg_data:
  mb_data:

networks:
  retail_net:
    driver: bridge
